<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog Detail - Chiro Popov Bouwt</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="css/main.css" />
    <link rel="icon" type="image/png" href="assets/img/logo/logo.png" />
  </head>
  <body>
    <!-- Volledige navigatie toegevoegd zoals op overzicht -->
    <header class="header sticky-top bg-light shadow-sm">
      <nav class="navbar navbar-expand-lg navbar-light container">
        <a class="navbar-brand fw-bold text-primary" href="index.html">
          <img
            src="assets/img/logo/logo.png"
            alt="Logo"
            style="height: 3rem; margin-right: 0.5rem"
            onerror="
              this.onerror = null;
              this.src =
                'https://placehold.co/2560x1440@3x/E4D096/00124D?text=Chiro%5CnPopov&font=roboto.png';
            "
          />
          Project P
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html#doel">Ons Doel</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="index.html#shop">Steun Ons</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="index.html#blog">Updates</a>
            </li>
            <li class="nav-item">
              <button
                class="btn btn-outline-primary ms-2"
                type="button"
                data-bs-toggle="offcanvas"
                data-bs-target="#cartOffcanvas"
              >
                <i class="bi bi-cart"></i> Winkelwagen
              </button>
            </li>
          </ul>
        </div>
      </nav>
    </header>

    <main class="container py-5 my-5">
      <div class="row justify-content-center">
        <div class="col-lg-8" id="blog-detail-container">
          <div class="text-center py-5">
            <div class="spinner-border text-primary" role="status">
              <span class="visually-hidden">Laden...</span>
            </div>
          </div>
          <!-- Inhoud wordt hier gedownload via main.js -->
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="scripts/main.js"></script>
  </body>
</html>
